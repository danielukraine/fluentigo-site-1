<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fluentigo</title>
    <script>
      (function () {
        var l = window.location;
        var redirect = l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + "/?/" + l.pathname.slice(1) + (l.search ? "&" + l.search.slice(1) : "") + l.hash;
        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
